# cbindgen configuration for ferrochart-ffi
# Generate C/C++ header: cbindgen --crate ferrochart-ffi --output ferrochart.h

language = "C"
include_guard = "FERROCHART_H"
tab_width = 4
style = "both"
cpp_compat = true

header = """
/*
 * FerroChart — C/C++ FFI Header (auto-generated by cbindgen)
 *
 * SPDX-License-Identifier: AGPL-3.0-or-later
 * Copyright (C) 2025 Robert Krick
 *
 * Usage:
 *   1. Link against libferrochart_ffi.so / .dylib / .dll / .a
 *   2. Include this header
 *   3. See docs/integration/c-cpp.md for examples
 */
"""

autogen_warning = "/* Warning: this file is auto-generated by cbindgen. Do not edit. */"

[export]
include = ["FcChart"]

[export.rename]
"FcChart" = "FcChart"

[fn]
# prefix all functions with nothing extra (they already have fc_ prefix)
rename_args = "None"

[enum]
rename_variants = "None"

[parse]
parse_deps = false
