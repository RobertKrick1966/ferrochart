name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - name: Clippy (core, render, examples)
        run: cargo clippy --workspace --exclude ferrochart-wasm --all-targets -- -D warnings

      - name: Clippy (wasm)
        run: cargo clippy --package ferrochart-wasm --target wasm32-unknown-unknown -- -D warnings

      - name: Test
        run: cargo test --workspace --exclude ferrochart-wasm

      - name: Format check
        run: cargo fmt --all -- --check

      - name: WASM build
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          wasm-pack build crates/wasm --target web