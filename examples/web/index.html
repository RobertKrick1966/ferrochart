<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>FerroChart Demo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #0e1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            color: #c8c8c8;
            padding: 16px;
        }
        .chart-container {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }
        .toolbar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
            padding: 6px 8px;
            background: #1a1e2e;
            border: 1px solid #333;
            border-bottom: none;
            font-size: 12px;
        }
        .toolbar select, .toolbar button, .toolbar input[type="text"] {
            font-family: monospace;
            font-size: 12px;
            padding: 3px 8px;
            cursor: pointer;
            background: #2a2e3e;
            color: #c8c8c8;
            border: 1px solid #444;
        }
        .toolbar label { font-size: 12px; white-space: nowrap; }
        .toolbar .separator { color: #555; padding: 0 2px; }
        .toolbar .status { color: #ffd700; margin-left: auto; min-width: 120px; text-align: right; }
        canvas {
            display: block;
            width: 100%;
            border: 1px solid #333;
            cursor: crosshair;
            outline: none;
        }
        .info {
            margin-top: 12px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <div class="toolbar">
            <!-- Symbol -->
            <label for="symbol-input">Symbol:</label>
            <input id="symbol-input" type="text" value="DEMO"
                style="width:70px;text-transform:uppercase;" />

            <span class="separator">|</span>

            <!-- Chart type -->
            <label for="chart-type">Type:</label>
            <select id="chart-type">
                <option value="candlestick">Candlestick</option>
                <option value="heikin_ashi">Heikin-Ashi</option>
                <option value="line">Line</option>
                <option value="area">Area</option>
                <option value="ohlc">OHLC Bars</option>
                <option value="renko">Renko</option>
                <option value="point_figure">Point &amp; Figure</option>
            </select>

            <span class="separator">|</span>

            <!-- Drawing tools -->
            <label for="draw-tool">Draw:</label>
            <select id="draw-tool">
                <option value="none">— Tool —</option>
                <optgroup label="Interactive">
                    <option value="trendline">Trendline</option>
                    <option value="corridor">Corridor</option>
                    <option value="fibonacci">Fibonacci</option>
                    <option value="ray">Ray</option>
                    <option value="measurement">Measurement</option>
                    <option value="ellipse">Ellipse</option>
                    <option value="pitchfork">Pitchfork (3pt)</option>
                    <option value="gann_fan">Gann Fan</option>
                    <option value="price_channel">Price Channel</option>
                </optgroup>
                <optgroup label="Quick Add">
                    <option value="add_hline">H-Line @ crosshair</option>
                    <option value="add_vline">V-Line @ crosshair</option>
                </optgroup>
            </select>
            <button id="btn-clear-draw">Clear Drawings</button>

            <span class="separator">|</span>

            <!-- Indicators -->
            <label for="ind-select">Indicator:</label>
            <select id="ind-select">
                <option value="">— Add —</option>
                <optgroup label="Overlay">
                    <option value="sma_20">SMA 20</option>
                    <option value="ema_10">EMA 10</option>
                    <option value="bollinger_20">Bollinger 20</option>
                    <option value="anchored_vwap_50">Anchored VWAP</option>
                    <option value="session_vwap">Session VWAP</option>
                    <option value="donchian_20">Donchian 20</option>
                    <option value="keltner_20">Keltner 20</option>
                    <option value="parabolic_sar">Parabolic SAR</option>
                    <option value="supertrend_10">Supertrend 10</option>
                    <option value="ichimoku">Ichimoku</option>
                </optgroup>
                <optgroup label="Sub-Panel">
                    <option value="rsi_14">RSI 14</option>
                    <option value="macd_26">MACD</option>
                    <option value="atr_14">ATR 14</option>
                    <option value="obv">OBV</option>
                    <option value="stochastic_14">Stochastic 14</option>
                    <option value="williams_r_14">Williams %R 14</option>
                    <option value="cci_20">CCI 20</option>
                    <option value="adx_14">ADX 14</option>
                    <option value="volume_sma_20">Volume SMA 20</option>
                    <option value="cusum_30">CUSUM</option>
                </optgroup>
            </select>
            <button id="btn-clear-ind">Clear Indicators</button>
            <button id="btn-custom-ind">+ Custom Ind</button>

            <span class="separator">|</span>

            <!-- Toggles -->
            <button id="log-toggle">Log Y</button>
            <button id="vp-toggle">Vol Profile</button>
            <button id="theme-toggle">Light/Dark</button>

            <span class="separator">|</span>

            <!-- Persist -->
            <button id="btn-save">Save</button>
            <button id="btn-load">Load</button>

            <span class="status" id="draw-status"></span>
        </div>
        <canvas id="chart"></canvas>
    </div>
    <div class="info">
        Scroll/+/- to zoom &middot; Drag/Arrows to pan &middot; Up/Down to scale Y
        &middot; Esc to cancel &middot; Home/End to jump &middot; Click canvas to focus keyboard
    </div>
    <script type="module">
        import init, { FerroChart } from '../../crates/wasm/pkg/ferrochart_wasm.js';

        let chart;
        let closes = [];
        let crosshairBar = -1;
        let crosshairPrice = 0;

        function resizeCanvas(canvas) {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = Math.round(rect.width * dpr);
            canvas.height = Math.round(rect.height * dpr);
        }

        async function run() {
            await init();

            const canvas = document.getElementById('chart');
            const container = canvas.parentElement;
            canvas.style.height = (container.clientWidth * 0.65) + 'px';
            resizeCanvas(canvas);

            chart = new FerroChart(canvas);

            // Generate 200 days of sample OHLCV data
            const baseTimestamp = 1700000000;
            const day = 86400;
            const timestamps = [], opens = [], highs = [], lows = [], volumes = [];

            let price = 100.0;
            for (let i = 0; i < 200; i++) {
                const mv = Math.sin(i * 0.3) * 3 + (Math.random() - 0.5) * 4;
                const open = price;
                const close = open + mv;
                const high = Math.max(open, close) + Math.abs(mv) * 0.4 + Math.random() * 2;
                const low  = Math.min(open, close) - Math.abs(mv) * 0.3 - Math.random() * 2;
                const vol  = 5000 + Math.abs(mv) * 1500 + Math.random() * 3000;
                timestamps.push(baseTimestamp + i * day);
                opens.push(open); highs.push(high);
                lows.push(low > 0 ? low : 0.1); closes.push(close); volumes.push(vol);
                price = close;
            }

            chart.setData(
                new Float64Array(timestamps), new Float64Array(opens),
                new Float64Array(highs),      new Float64Array(lows),
                new Float64Array(closes),     new Float64Array(volumes),
            );

            // Default indicators
            chart.addIndicator('sma', 20);
            chart.addIndicator('rsi', 14);

            // Sample markers
            chart.addMarker(15, 'arrow_up',   'below', 0, 200, 0,   'Hammer');
            chart.addMarker(32, 'arrow_down', 'above', 200, 0, 0,   'Shooting Star');
            chart.addMarker(58, 'arrow_up',   'below', 0, 200, 0,   'Engulfing');
            chart.addMarker(75, 'diamond',    'above', 255, 165, 0, 'Doji');
            chart.addMarker(95, 'circle',     'below', 0, 150, 255, 'Support');

            // Sample annotations
            chart.addTrendLine(20, opens[20], 80, closes[80], 255, 255, 0, true);
            chart.addFibonacci(40, Math.max(...highs.slice(35, 50)), 60, Math.min(...lows.slice(55, 65)), 255, 165, 0);
            chart.addTripleBarrier(30, closes[30], closes[30]*1.04, closes[30]*0.97, 15, 38, 'tp', 100, 180, 255);

            // ML overlays
            const upper = closes.map((c, i) => i < 40 ? NaN : c * 1.02);
            const lower = closes.map((c, i) => i < 40 ? NaN : c * 0.98);
            chart.addConfidenceBand(new Float64Array(upper), new Float64Array(lower), 100, 200, 255, 35);
            chart.addWalkForwardZone(0, 60, true, 'Train 1');
            chart.addWalkForwardZone(60, 90, false, 'Val 1');
            chart.addWalkForwardZone(90, 150, true, 'Train 2');
            chart.addWalkForwardZone(150, 180, false, 'Val 2');
            chart.addNewsEvent(25, 'Earnings', 0.8, 3);
            chart.addNewsEvent(70, 'FDA', -0.6, 2);

            // Track crosshair via the chart's own accurate transform
            canvas.addEventListener('mousemove', () => {
                const p = chart.getCrosshairPrice();
                const b = chart.getCrosshairBar();
                if (!isNaN(p) && b >= 0) {
                    crosshairPrice = p;
                    crosshairBar   = b;
                }
            });

            // ── Chart type ──
            document.getElementById('chart-type').addEventListener('change', (e) => {
                try { chart.setChartType(e.target.value); } catch(err) { console.error(err); }
                canvas.focus();
            });

            // ── Drawing tools ──
            const drawSelect = document.getElementById('draw-tool');
            const status = document.getElementById('draw-status');

            drawSelect.addEventListener('change', () => {
                const mode = drawSelect.value;
                if (mode === 'add_hline') {
                    if (crosshairPrice > 0) {
                        try { chart.addHorizontalRay(crosshairPrice, '#ffd700', 1.5); } catch(e) { console.warn(e); }
                        status.textContent = `H-Line @ ${crosshairPrice.toFixed(2)}`;
                    } else {
                        status.textContent = 'Move cursor over chart first';
                    }
                    drawSelect.selectedIndex = 0;
                } else if (mode === 'add_vline') {
                    if (crosshairBar >= 0) {
                        try { chart.addVerticalLine(crosshairBar, '#64c8ff', 1.0); } catch(e) { console.warn(e); }
                        status.textContent = `V-Line @ bar ${crosshairBar}`;
                    } else {
                        status.textContent = 'Move cursor over chart first';
                    }
                    drawSelect.selectedIndex = 0;
                } else {
                    chart.setDrawMode(mode);
                    const statusMap = {
                        'none': '',
                        'trendline': 'Click 2 points',
                        'fibonacci': 'Click 2 points',
                        'corridor': 'Click 3 points: start, end, offset',
                        'ray': 'Click 2 points',
                        'measurement': 'Click 2 points',
                        'ellipse': 'Click 2 points',
                        'pitchfork': 'Click 3 points',
                        'gann_fan': 'Click 2 points (anchor + scale)',
                        'price_channel': 'Click 2 points (start + end)',
                    };
                    status.textContent = statusMap[mode] ?? 'Click 2 points';
                    if (mode === 'none') drawSelect.selectedIndex = 0;
                }
                canvas.focus();
            });

            document.getElementById('btn-clear-draw').addEventListener('click', () => {
                chart.clearAnnotations();
                status.textContent = 'Drawings cleared';
                canvas.focus();
            });

            // ── Indicators ──
            const indSelect = document.getElementById('ind-select');
            indSelect.addEventListener('change', () => {
                const val = indSelect.value;
                if (!val) return;
                const [name, period] = val.split('_');
                const p = period ? parseInt(period) : null;
                try {
                    if (val === 'anchored_vwap_50') {
                        chart.addAnchoredVwap(50);
                    } else if (val === 'session_vwap') {
                        chart.addIndicator('session_vwap', 0);
                    } else if (val === 'ichimoku') {
                        chart.addIndicator('ichimoku', 9);
                    } else if (val === 'parabolic_sar') {
                        chart.addIndicator('parabolic_sar', 0);
                    } else if (val === 'obv') {
                        chart.addIndicator('obv', 0);
                    } else if (val === 'macd_26') {
                        chart.addIndicator('macd', 26);
                    } else {
                        chart.addIndicator(name, p || 14);
                    }
                    status.textContent = `Added: ${val}`;
                } catch(e) { console.error(e); status.textContent = `Error: ${e}`; }
                indSelect.selectedIndex = 0;
                canvas.focus();
            });

            document.getElementById('btn-clear-ind').addEventListener('click', () => {
                chart.clearIndicators();
                status.textContent = 'Indicators cleared';
                canvas.focus();
            });

            // Custom indicator from JS-computed values
            document.getElementById('btn-custom-ind').addEventListener('click', () => {
                const period = 10;
                const ma = new Float64Array(closes.length);
                for (let i = 0; i < closes.length; i++) {
                    if (i < period - 1) { ma[i] = NaN; continue; }
                    let sum = 0;
                    for (let j = i - period + 1; j <= i; j++) sum += closes[j];
                    ma[i] = sum / period;
                }
                chart.addCustomOverlay('JS MA(10)', ma, 1);
                status.textContent = 'Added custom JS indicator';
                canvas.focus();
            });

            // ── Log Y ──
            let isLog = false;
            document.getElementById('log-toggle').addEventListener('click', () => {
                isLog = !isLog;
                chart.setLogScale(isLog);
                document.getElementById('log-toggle').textContent = isLog ? 'Linear Y' : 'Log Y';
                canvas.focus();
            });

            // ── Volume Profile ──
            let vpOn = false;
            document.getElementById('vp-toggle').addEventListener('click', () => {
                vpOn = !vpOn;
                chart.showVolumeProfile(vpOn ? 50 : 0);
                document.getElementById('vp-toggle').textContent = vpOn ? 'Hide VP' : 'Vol Profile';
                canvas.focus();
            });

            // ── Theme ──
            let isDark = true;
            document.getElementById('theme-toggle').addEventListener('click', () => {
                isDark = !isDark;
                chart.setTheme(isDark ? 'dark' : 'light');
                document.body.style.background = isDark ? '#0e1117' : '#f0f0f0';
            });

            // ── Save / Load ──
            const symbolInput = document.getElementById('symbol-input');
            const storageKey = () => `ferrochart-annotations-${symbolInput.value.trim().toUpperCase()}`;

            const saved = localStorage.getItem(storageKey());
            if (saved) {
                try { chart.importAnnotations(saved); status.textContent = 'Loaded'; } catch(e) { console.warn(e); }
            }

            document.getElementById('btn-save').addEventListener('click', () => {
                localStorage.setItem(storageKey(), chart.exportAnnotations());
                status.textContent = `Saved (${symbolInput.value.toUpperCase()})`;
                canvas.focus();
            });

            document.getElementById('btn-load').addEventListener('click', () => {
                const json = localStorage.getItem(storageKey());
                if (json) {
                    chart.importAnnotations(json);
                    status.textContent = `Loaded (${symbolInput.value.toUpperCase()})`;
                } else {
                    status.textContent = 'No saved data';
                }
                canvas.focus();
            });

            // ── Focus / Resize ──
            canvas.addEventListener('click', () => canvas.focus());
            window.addEventListener('resize', () => {
                canvas.style.height = (container.clientWidth * 0.65) + 'px';
                resizeCanvas(canvas);
                chart.resize(canvas.width, canvas.height);
            });
        }

        run().catch(console.error);
    </script>
</body>
</html>
