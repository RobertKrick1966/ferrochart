<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>PowerChart Demo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #0e1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            color: #c8c8c8;
            padding: 16px;
        }
        .chart-container {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }
        canvas {
            display: block;
            width: 100%;
            border: 1px solid #333;
            cursor: crosshair;
        }
        .info {
            margin-top: 12px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>
    <div class="info">
        Scroll to zoom &middot; Drag to pan &middot; Move mouse for crosshair
        &middot; Drag right margin to scale Y &middot; Double-click to reset
        <br>
        <button id="theme-toggle" style="margin-top:8px;padding:4px 12px;cursor:pointer;font-family:monospace">Toggle Light/Dark</button>
    </div>
    <script type="module">
        import init, { PowerChart } from '../../crates/wasm/pkg/powerchart_wasm.js';

        let chart;

        function resizeCanvas(canvas) {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = Math.round(rect.width * dpr);
            canvas.height = Math.round(rect.height * dpr);
        }

        async function run() {
            await init();

            const canvas = document.getElementById('chart');

            // Set CSS height based on aspect ratio
            const container = canvas.parentElement;
            canvas.style.height = (container.clientWidth * 0.65) + 'px';
            resizeCanvas(canvas);

            chart = new PowerChart(canvas);

            // Generate 200 days of sample OHLCV data
            const baseTimestamp = 1700000000;
            const day = 86400;
            const timestamps = [];
            const opens = [];
            const highs = [];
            const lows = [];
            const closes = [];
            const volumes = [];

            let price = 100.0;
            for (let i = 0; i < 200; i++) {
                const mv = Math.sin(i * 0.3) * 3 + (Math.random() - 0.5) * 4;
                const open = price;
                const close = open + mv;
                const high = Math.max(open, close) + Math.abs(mv) * 0.4 + Math.random() * 2;
                const low = Math.min(open, close) - Math.abs(mv) * 0.3 - Math.random() * 2;
                const volume = 5000 + Math.abs(mv) * 1500 + Math.random() * 3000;

                timestamps.push(baseTimestamp + i * day);
                opens.push(open);
                highs.push(high);
                lows.push(low > 0 ? low : 0.1);
                closes.push(close);
                volumes.push(volume);

                price = close;
            }

            chart.setData(
                new Float64Array(timestamps),
                new Float64Array(opens),
                new Float64Array(highs),
                new Float64Array(lows),
                new Float64Array(closes),
                new Float64Array(volumes),
            );

            chart.addIndicator('sma', 20);
            chart.addIndicator('ema', 10);
            chart.addIndicator('bollinger', 20);
            chart.addIndicator('rsi', 14);
            chart.addIndicator('macd', 26);

            // Add sample pattern markers
            chart.addMarker(15, 'arrow_up', 'below', 0, 200, 0, 'Hammer');
            chart.addMarker(32, 'arrow_down', 'above', 200, 0, 0, 'Shooting Star');
            chart.addMarker(58, 'arrow_up', 'below', 0, 200, 0, 'Engulfing');
            chart.addMarker(75, 'diamond', 'above', 255, 165, 0, 'Doji');
            chart.addMarker(95, 'circle', 'below', 0, 150, 255, 'Support');
            chart.addMarker(120, 'arrow_down', 'above', 200, 0, 0, 'Evening Star');

            // Trendline example
            chart.addTrendLine(20, opens[20], 80, closes[80], 255, 255, 0, true);

            // Fibonacci retracement example
            chart.addFibonacci(40, Math.max(...highs.slice(35, 50)), 60, Math.min(...lows.slice(55, 65)), 255, 165, 0);

            // Theme toggle
            let isDark = true;
            document.getElementById('theme-toggle').addEventListener('click', () => {
                isDark = !isDark;
                chart.setTheme(isDark ? 'dark' : 'light');
                document.body.style.background = isDark ? '#0e1117' : '#f0f0f0';
            });

            // Handle window resize
            window.addEventListener('resize', () => {
                canvas.style.height = (container.clientWidth * 0.65) + 'px';
                resizeCanvas(canvas);
                chart.resize(canvas.width, canvas.height);
            });
        }

        run().catch(console.error);
    </script>
</body>
</html>
