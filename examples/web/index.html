<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>PowerChart Demo</title>
    <style>
        body {
            margin: 0;
            background: #0e1117;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            color: #c8c8c8;
        }
        canvas {
            border: 1px solid #333;
            cursor: crosshair;
        }
        .info {
            margin-top: 12px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <canvas id="chart" width="900" height="700"></canvas>
    <div class="info">
        Scroll to zoom &middot; Drag to pan &middot; Move mouse for crosshair
    </div>
    <script type="module">
        import init, { PowerChart } from '../../crates/wasm/pkg/powerchart_wasm.js';

        // Keep chart alive at module scope so GC doesn't drop closures
        let chart;

        async function run() {
            await init();

            const canvas = document.getElementById('chart');
            chart = new PowerChart(canvas);

            // Generate 120 days of sample OHLCV data
            const baseTimestamp = 1700000000;
            const day = 86400;
            const timestamps = [];
            const opens = [];
            const highs = [];
            const lows = [];
            const closes = [];
            const volumes = [];

            let price = 100.0;
            for (let i = 0; i < 120; i++) {
                const mv = Math.sin(i * 0.3) * 3 + (Math.random() - 0.5) * 4;
                const open = price;
                const close = open + mv;
                const high = Math.max(open, close) + Math.abs(mv) * 0.4 + Math.random() * 2;
                const low = Math.min(open, close) - Math.abs(mv) * 0.3 - Math.random() * 2;
                const volume = 5000 + Math.abs(mv) * 1500 + Math.random() * 3000;

                timestamps.push(baseTimestamp + i * day);
                opens.push(open);
                highs.push(high);
                lows.push(low > 0 ? low : 0.1);
                closes.push(close);
                volumes.push(volume);

                price = close;
            }

            chart.setData(
                new Float64Array(timestamps),
                new Float64Array(opens),
                new Float64Array(highs),
                new Float64Array(lows),
                new Float64Array(closes),
                new Float64Array(volumes),
            );

            // Add indicators
            chart.addIndicator('sma', 20);
            chart.addIndicator('ema', 10);
            chart.addIndicator('bollinger', 20);
            chart.addIndicator('rsi', 14);
            chart.addIndicator('macd', 26);
        }

        run().catch(console.error);
    </script>
</body>
</html>
