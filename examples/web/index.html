<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>FerroChart Demo</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #0e1117;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: monospace;
            color: #c8c8c8;
            padding: 16px;
        }
        .chart-container {
            width: 100%;
            max-width: 1200px;
            position: relative;
        }
        .toolbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            background: #1a1e2e;
            border: 1px solid #333;
            border-bottom: none;
            font-size: 12px;
        }
        .toolbar select, .toolbar button {
            font-family: monospace;
            font-size: 12px;
            padding: 3px 8px;
            cursor: pointer;
            background: #2a2e3e;
            color: #c8c8c8;
            border: 1px solid #444;
        }
        .toolbar .separator { color: #555; }
        .toolbar .status { color: #ffd700; margin-left: auto; }
        canvas {
            display: block;
            width: 100%;
            border: 1px solid #333;
            cursor: crosshair;
            outline: none;
        }
        .info {
            margin-top: 12px;
            font-size: 12px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="chart-container">
        <div class="toolbar">
            <label for="symbol-input" style="font-size:12px;">Symbol:</label>
            <input id="symbol-input" type="text" value="DEMO" style="width:80px;font-family:monospace;font-size:12px;padding:3px 8px;background:#2a2e3e;color:#c8c8c8;border:1px solid #444;text-transform:uppercase;" />
            <span class="separator">|</span>
            <select id="draw-tool">
                <option value="none">Select Tool...</option>
                <option value="trendline">Trendline</option>
                <option value="corridor">Corridor (parallel)</option>
                <option value="fibonacci">Fibonacci Retracement</option>
            </select>
            <button id="btn-clear">Clear Drawings</button>
            <button id="btn-save">Save</button>
            <button id="btn-load">Load</button>
            <span class="separator">|</span>
            <button id="theme-toggle">Light/Dark</button>
            <button id="log-toggle">Log Y</button>
            <span class="status" id="draw-status"></span>
        </div>
        <canvas id="chart"></canvas>
    </div>
    <div class="info">
        Scroll/+/- to zoom &middot; Drag/Arrows to pan &middot; Up/Down to scale Y
        &middot; Esc to cancel &middot; Home/End to jump &middot; Click canvas to focus keyboard
    </div>
    <script type="module">
        import init, { FerroChart } from '../../crates/wasm/pkg/ferrochart_wasm.js';

        let chart;

        function resizeCanvas(canvas) {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            canvas.width = Math.round(rect.width * dpr);
            canvas.height = Math.round(rect.height * dpr);
        }

        async function run() {
            await init();

            const canvas = document.getElementById('chart');

            // Set CSS height based on aspect ratio
            const container = canvas.parentElement;
            canvas.style.height = (container.clientWidth * 0.65) + 'px';
            resizeCanvas(canvas);

            chart = new FerroChart(canvas);

            // Generate 200 days of sample OHLCV data
            const baseTimestamp = 1700000000;
            const day = 86400;
            const timestamps = [];
            const opens = [];
            const highs = [];
            const lows = [];
            const closes = [];
            const volumes = [];

            let price = 100.0;
            for (let i = 0; i < 200; i++) {
                const mv = Math.sin(i * 0.3) * 3 + (Math.random() - 0.5) * 4;
                const open = price;
                const close = open + mv;
                const high = Math.max(open, close) + Math.abs(mv) * 0.4 + Math.random() * 2;
                const low = Math.min(open, close) - Math.abs(mv) * 0.3 - Math.random() * 2;
                const volume = 5000 + Math.abs(mv) * 1500 + Math.random() * 3000;

                timestamps.push(baseTimestamp + i * day);
                opens.push(open);
                highs.push(high);
                lows.push(low > 0 ? low : 0.1);
                closes.push(close);
                volumes.push(volume);

                price = close;
            }

            chart.setData(
                new Float64Array(timestamps),
                new Float64Array(opens),
                new Float64Array(highs),
                new Float64Array(lows),
                new Float64Array(closes),
                new Float64Array(volumes),
            );

            chart.addIndicator('sma', 20);
            chart.addIndicator('ema', 10);
            chart.addIndicator('bollinger', 20);
            chart.addIndicator('rsi', 14);
            chart.addIndicator('macd', 26);
            chart.addIndicator('cusum', 30); // threshold = 30/1000 = 3%

            // Add sample pattern markers
            chart.addMarker(15, 'arrow_up', 'below', 0, 200, 0, 'Hammer');
            chart.addMarker(32, 'arrow_down', 'above', 200, 0, 0, 'Shooting Star');
            chart.addMarker(58, 'arrow_up', 'below', 0, 200, 0, 'Engulfing');
            chart.addMarker(75, 'diamond', 'above', 255, 165, 0, 'Doji');
            chart.addMarker(95, 'circle', 'below', 0, 150, 255, 'Support');
            chart.addMarker(120, 'arrow_down', 'above', 200, 0, 0, 'Evening Star');

            // Trendline example
            chart.addTrendLine(20, opens[20], 80, closes[80], 255, 255, 0, true);

            // Fibonacci retracement example
            chart.addFibonacci(40, Math.max(...highs.slice(35, 50)), 60, Math.min(...lows.slice(55, 65)), 255, 165, 0);

            // Triple barrier examples
            chart.addTripleBarrier(30, closes[30], closes[30]*1.04, closes[30]*0.97, 15, 38, 'tp', 100, 180, 255);
            chart.addTripleBarrier(80, closes[80], closes[80]*1.05, closes[80]*0.96, 20, 95, 'sl', 255, 150, 50);
            chart.addTripleBarrier(130, closes[130], closes[130]*1.03, closes[130]*0.98, 12, null, '', 180, 180, 180);

            // Drawing tool dropdown
            const drawSelect = document.getElementById('draw-tool');
            const status = document.getElementById('draw-status');
            drawSelect.addEventListener('change', () => {
                const mode = drawSelect.value;
                chart.setDrawMode(mode);
                status.textContent = mode === 'none' ? '' :
                    mode === 'corridor' ? 'Click 3 points: start, end, offset' :
                    'Click 2 points';
                if (mode === 'none') drawSelect.selectedIndex = 0;
                canvas.focus();
            });

            document.getElementById('btn-clear').addEventListener('click', () => {
                chart.clearAnnotations();
                canvas.focus();
            });

            const symbolInput = document.getElementById('symbol-input');
            const storageKey = () => `ferrochart-annotations-${symbolInput.value.trim().toUpperCase()}`;

            // Auto-load annotations for current symbol on startup
            const saved = localStorage.getItem(storageKey());
            if (saved) {
                try { chart.importAnnotations(saved); status.textContent = 'Loaded'; } catch(e) { console.warn('load failed:', e); }
            }

            document.getElementById('btn-save').addEventListener('click', () => {
                const json = chart.exportAnnotations();
                localStorage.setItem(storageKey(), json);
                status.textContent = `Saved (${symbolInput.value.toUpperCase()})`;
                canvas.focus();
            });

            document.getElementById('btn-load').addEventListener('click', () => {
                const json = localStorage.getItem(storageKey());
                if (json) {
                    chart.importAnnotations(json);
                    status.textContent = `Loaded (${symbolInput.value.toUpperCase()})`;
                } else {
                    status.textContent = 'No saved annotations';
                }
                canvas.focus();
            });

            // Log Y-axis toggle
            let isLog = false;
            document.getElementById('log-toggle').addEventListener('click', () => {
                isLog = !isLog;
                chart.setLogScale(isLog);
                document.getElementById('log-toggle').textContent = isLog ? 'Linear Y' : 'Log Y';
                canvas.focus();
            });

            // Focus canvas on click for keyboard events
            canvas.addEventListener('click', () => canvas.focus());

            // Theme toggle
            let isDark = true;
            document.getElementById('theme-toggle').addEventListener('click', () => {
                isDark = !isDark;
                chart.setTheme(isDark ? 'dark' : 'light');
                document.body.style.background = isDark ? '#0e1117' : '#f0f0f0';
            });

            // Handle window resize
            window.addEventListener('resize', () => {
                canvas.style.height = (container.clientWidth * 0.65) + 'px';
                resizeCanvas(canvas);
                chart.resize(canvas.width, canvas.height);
            });
        }

        run().catch(console.error);
    </script>
</body>
</html>
